<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --blue-primary: #2563EB; --blue-hover: #1D4ED8; --blue-light: #EFF6FF;
            --blue-mid: #BFDBFE; --text-dark: #0F172A; --text-mid: #475569;
            --text-light: #94A3B8; --border: #E2E8F0; --white: #FFFFFF; --bg: #F8FAFC;
            --shadow-lg: 0 12px 48px rgba(37,99,235,0.13); --radius-sm: 9px;
        }
        body {
            font-family: 'Sora', sans-serif; background: var(--bg); min-height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(37,99,235,0.07) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
        }
        body::after {
            content: ''; position: fixed; bottom: -100px; left: -100px; width: 380px; height: 380px;
            background: radial-gradient(circle, rgba(37,99,235,0.05) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
        }
        .container { width: 100%; max-width: 420px; padding: 20px; animation: fadeUp 0.5s ease both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .card {
            background: var(--white); border-radius: 22px; padding: 44px 40px 40px;
            box-shadow: var(--shadow-lg); border: 1px solid rgba(226,232,240,0.8); position: relative;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 56px; height: 4px; background: var(--blue-primary); border-radius: 0 0 6px 6px;
        }
        .logo { display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
        .logo-icon {
            width: 52px; height: 52px; background: var(--blue-light); border-radius: 14px;
            display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--blue-mid);
        }
        .logo-icon svg { width: 26px; height: 26px; color: var(--blue-primary); }
        .title { font-size: 1.45rem; font-weight: 700; color: var(--text-dark); text-align: center; letter-spacing: -0.02em; margin-bottom: 6px; }
        .subtitle { font-size: 0.85rem; color: var(--text-light); text-align: center; margin-bottom: 32px; }
        .form { display: flex; flex-direction: column; gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 7px; }
        label { font-size: 0.8rem; font-weight: 600; color: var(--text-mid); letter-spacing: 0.04em; text-transform: uppercase; }
        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            width: 18px; height: 18px; color: var(--text-light); pointer-events: none; transition: color 0.2s;
        }
        input[type="text"], input[type="email"] {
            width: 100%; padding: 12px 14px 12px 42px; border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); font-family: 'Sora', sans-serif; font-size: 0.92rem;
            color: var(--text-dark); background: var(--white); outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input::placeholder { color: var(--text-light); font-weight: 300; }
        input:focus { border-color: var(--blue-primary); box-shadow: 0 0 0 3.5px rgba(37,99,235,0.10); background: var(--blue-light); }
        .field:focus-within .input-icon { color: var(--blue-primary); }
        .button {
            width: 100%; padding: 13px; background: var(--blue-primary); color: var(--white);
            border: none; border-radius: var(--radius-sm); font-family: 'Sora', sans-serif;
            font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 6px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(37,99,235,0.30); position: relative; overflow: hidden;
        }
        .button::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0.07), transparent); pointer-events: none; }
        .button:hover { background: var(--blue-hover); box-shadow: 0 6px 20px rgba(37,99,235,0.38); transform: translateY(-1px); }
        .button:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(37,99,235,0.25); }
        @media (max-width: 480px) { .card { padding: 36px 24px 32px; } .title { font-size: 1.25rem; } }
    </style>
</head>
<body>
    <main class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
            </div>

            <h1 class="title">Crie sua conta</h1>
            <p class="subtitle">Preencha seus dados para continuar</p>

            <form class="form" method="post">
                <div class="field">
                    <label for="name">Nome</label>
                    <div class="input-wrapper">
                        <input type="text" id="name" name="name" placeholder="Digite seu nome" required>
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>

                <div class="field">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                    </div>
                </div>

                <button class="button" type="submit">Continuar</button>
            </form>
        </div>
    </main>
</body>
<script type="module" src="api.js"></script>
</html>
