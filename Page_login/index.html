<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page de Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue-primary: #2563EB;
            --blue-hover: #1D4ED8;
            --blue-light: #EFF6FF;
            --blue-mid: #BFDBFE;
            --text-dark: #0F172A;
            --text-mid: #475569;
            --text-light: #94A3B8;
            --border: #E2E8F0;
            --white: #FFFFFF;
            --bg: #F8FAFC;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 24px rgba(37, 99, 235, 0.10), 0 1px 4px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 48px rgba(37, 99, 235, 0.13);
            --radius: 14px;
            --radius-sm: 9px;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle background decoration */
        body::before {
            content: '';
            position: fixed;
            top: -120px;
            right: -120px;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(37,99,235,0.07) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -100px;
            left: -100px;
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(37,99,235,0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--white);
            border-radius: 22px;
            padding: 44px 40px 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(226, 232, 240, 0.8);
            position: relative;
        }

        /* Blue accent top bar */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 56px;
            height: 4px;
            background: var(--blue-primary);
            border-radius: 0 0 6px 6px;
        }

        /* Logo / icon */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: var(--blue-light);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--blue-mid);
        }

        .logo-icon svg {
            width: 26px;
            height: 26px;
            color: var(--blue-primary);
        }

        .title {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--text-dark);
            text-align: center;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-mid);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-light);
            pointer-events: none;
            transition: color 0.2s;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Sora', sans-serif;
            font-size: 0.92rem;
            color: var(--text-dark);
            background: var(--white);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--text-light);
            font-weight: 300;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--blue-primary);
            box-shadow: 0 0 0 3.5px rgba(37,99,235,0.10);
            background: var(--blue-light);
        }

        input[type="text"]:focus + .input-icon,
        input[type="password"]:focus + .input-icon {
            color: var(--blue-primary);
        }

        .field:focus-within .input-icon {
            color: var(--blue-primary);
        }

        .forgot {
            text-align: right;
            margin-top: -10px;
        }

        .forgot a {
            font-size: 0.78rem;
            color: var(--blue-primary);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .forgot a:hover {
            opacity: 0.7;
            text-decoration: underline;
        }

        .button {
            width: 100%;
            padding: 13px;
            background: var(--blue-primary);
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Sora', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            margin-top: 6px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(37,99,235,0.30);
            position: relative;
            overflow: hidden;
        }

        .button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.07), transparent);
            pointer-events: none;
        }

        .button:hover {
            background: var(--blue-hover);
            box-shadow: 0 6px 20px rgba(37,99,235,0.38);
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0px);
            box-shadow: 0 2px 8px rgba(37,99,235,0.25);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 0.75rem;
            color: var(--text-light);
            white-space: nowrap;
        }

        .register {
            text-align: center;
            font-size: 0.83rem;
            color: var(--text-light);
        }

        .register a {
            color: var(--blue-primary);
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .register a:hover {
            opacity: 0.75;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card { padding: 36px 24px 32px; }
            .title { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
            </div>

            <h1 class="title">Bem-vindo de volta</h1>
            <p class="subtitle">Faça login para continuar</p>

            <form class="form" action="/login" method="post">
                <div class="field">
                    <label for="username">Usuário</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>

                <div class="field">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                </div>

                <div class="forgot">
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button class="button" type="submit">Entrar</button>

                <div class="divider"><span>ou</span></div>

                <p class="register">Não tem uma conta? <a href="#">Cadastre-se</a></p>
            </form>
        </div>
    </main>
</body>
</html>
```
